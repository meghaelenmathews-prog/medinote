// Fetch medicine details from RxNorm API
async function getRxNormData(medicineName) {
try {
const response = await fetch(
`https://rxnav.nlm.nih.gov/REST/drugs.json?name=${medicineName}`
);
const data = await response.json();

if (data.drugGroup && data.drugGroup.conceptGroup && data.drugGroup.conceptGroup.length > 0) {
const concept = data.drugGroup.conceptGroup[0].conceptProperties[0];
return {
name: concept.name,
rxcui: concept.rxcui,
tty: concept.tty
};
}
return null;
} catch (error) {
console.log('RxNorm API Error');
return null;
}
}

// Fetch side effects and warnings from OpenFDA API
async function getOpenFDAData(medicineName) {
try {
const response = await fetch(
`https://api.fda.gov/drug/event.json?search=patient.drug.openfda.generic_name:"${medicineName}"&limit=1`
);
const data = await response.json();

if (data.results && data.results.length > 0) {
const adverse = data.results[0].adverse_events || [];
const sideEffects = adverse.slice(0, 3).map(e => e.outcome || 'Unknown');
return {
sideEffects: sideEffects.length > 0 ? sideEffects : ['Consult FDA database']
};
}
return null;
} catch (error) {
console.log('OpenFDA API Error - Using database info');
return null;
}
}

// Fetch from PubChem for chemical compound info
async function getPubChemData(medicineName) {
try {
const response = await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/autocomplete/compound/${medicineName}/json?limit=1`
);
const data = await response.json();

if (data.dictionary_terms && data.dictionary_terms.compound && data.dictionary_terms.compound.length > 0) {
const compound = data.dictionary_terms.compound[0];
return {
chemicalName: compound,
source: 'PubChem'
};
}
return null;
} catch (error) {
console.log('PubChem API Error');
return null;
}
}

  <div style="font-size:24px; margin-bottom:20px;">❌ No Information Found</div>
  <p style="margin-bottom:20px; opacity:0.9;">We couldn't find information for "<strong>${disease}</strong>"</p>
  <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; margin:20px 0; text-align:left; font-size:13px;">
    <strong>Available Conditions (30+ options):</strong><br><br>
    Fever • Cold • Cough • Sorethroat • Asthma • Diabetes • Hypertension • Headache • Migraine • Acne • Indigestion • Diarrhea • Constipation • Skinallergy • Eczema • Hairloss • Anxiety • Depression • Insomnia • Backpain • Jointpain • Arthritis • Pneumonia • Bronchitis • UTI • Sinusitis • Highcholesterol • Anemia • Hypothyroidism • Gastritis
  </div>
  <p style="opacity:0.8; margin-top:20px;">💡 Try one of the above conditions or use Quick Access buttons</p>
</div>`;
}
}

// Show search suggestions
function showSuggestions() {
const input = document.getElementById("disease").value.toLowerCase().trim();
const suggestionsDiv = document.getElementById("suggestions");

if (input.length === 0) {
suggestionsDiv.style.display = "none";
return;
}

const diseases = Object.keys(medicineDatabase);
const filtered = diseases.filter(d => d.includes(input));

if (filtered.length === 0) {
suggestionsDiv.style.display = "none";
return;
}

suggestionsDiv.style.display = "block";
suggestionsDiv.innerHTML = filtered.map(disease => 
  `<div class="suggestion-item" onclick="selectSuggestion('${disease}')">${disease.charAt(0).toUpperCase() + disease.slice(1)}</div>`
).join('');
}

// Select from suggestions
function selectSuggestion(disease) {
document.getElementById("disease").value = disease;
document.getElementById("suggestions").style.display = "none";
searchMedicine();
}

// Quick search function
function quickSearch(disease) {
document.getElementById("disease").value = disease;
searchMedicine();
}

// Theme toggle
document.getElementById("themeToggle").addEventListener("click", function() {
document.body.style.background = document.body.style.background.includes("135") ? 
  "linear-gradient(225deg, #1a1a2e, #16213e, #0f3460)" : 
  "linear-gradient(135deg, #667eea, #764ba2, #43cea2)";
document.body.style.backgroundSize = "400% 400%";
document.body.style.animation = "bgMove 15s infinite alternate";
this.textContent = document.body.style.background.includes("135") ? "☀️" : "🌙";
});

// Allow Enter key to search
document.addEventListener("DOMContentLoaded", function() {
document.getElementById("disease").addEventListener("keypress", function(event) {
if (event.key === "Enter") {
searchMedicine();
}
});
});

</script>
