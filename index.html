// Fetch medicine details from RxNorm API
async function getRxNormData(medicineName) {
try {
const response = await fetch(
`https://rxnav.nlm.nih.gov/REST/drugs.json?name=${medicineName}`
);
const data = await response.json();

if (data.drugGroup && data.drugGroup.conceptGroup && data.drugGroup.conceptGroup.length > 0) {
const concept = data.drugGroup.conceptGroup[0].conceptProperties[0];
return {
name: concept.name,
rxcui: concept.rxcui,
tty: concept.tty
};
}
return null;
} catch (error) {
console.log('RxNorm API Error');
return null;
}
}

// Fetch side effects and warnings from OpenFDA API
async function getOpenFDAData(medicineName) {
try {
const response = await fetch(
`https://api.fda.gov/drug/event.json?search=patient.drug.openfda.generic_name:"${medicineName}"&limit=1`
);
const data = await response.json();

if (data.results && data.results.length > 0) {
const adverse = data.results[0].adverse_events || [];
const sideEffects = adverse.slice(0, 3).map(e => e.outcome || 'Unknown');
return {
sideEffects: sideEffects.length > 0 ? sideEffects : ['Consult FDA database']
};
}
return null;
} catch (error) {
console.log('OpenFDA API Error - Using database info');
return null;
}
}

// Fetch from PubChem for chemical compound info
async function getPubChemData(medicineName) {
try {
const response = await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/autocomplete/compound/${medicineName}/json?limit=1`
);
const data = await response.json();

if (data.dictionary_terms && data.dictionary_terms.compound && data.dictionary_terms.compound.length > 0) {
const compound = data.dictionary_terms.compound[0];
return {
chemicalName: compound,
source: 'PubChem'
};
}
return null;
} catch (error) {
console.log('PubChem API Error');
return null;
}
}
